name: Daily Pyrolysis Update

on:
  schedule:
    - cron: '0 1 * * *'   # 每天 UTC 01:00 = 北京时间 09:00
  workflow_dispatch:        # 允许手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # 完整权限，不影响现有功能
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      # 你的原有抓取逻辑，完全不变
      - name: Run daily update
        run: python pyro_daily_update.py

      # 你的原有提交逻辑，完全不变
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "pyrolysis-daily.store" > CNAME
          git add data/ index.html CNAME
          git diff --cached --quiet || git commit -m "chore: daily update $(date +'%Y-%m-%d')"
          git push

      # 新增：直接部署上线，替代系统构建，解决页面覆盖问题
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
