name: Daily Pyrolysis Update

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run daily update
        run: python pyro_daily_update.py

      # 👇 修复点1：先生成CNAME，准备好所有最新文件
      - name: Prepare CNAME
        run: echo "pyrolysis-daily.store" > CNAME

      # 👇 修复点2：【先打包最新文件部署】（核心修正！）
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      # 👇 修复点3：立即部署最新文件
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5

      # 👇 修复点4：【部署完，再提交代码到仓库】
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ index.html CNAME
          git diff --cached --quiet || git commit -m "chore: daily update $(date +'%Y-%m-%d')"
          git push
