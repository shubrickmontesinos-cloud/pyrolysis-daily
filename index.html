<script>
// ── Config ──────────────────────────────────────────────────────
const CATEGORIES = ['全部','塑料热解','生物质热解','催化热解','创新催化剂','科研圈'];
const CAT_ICONS  = {'全部':'🌐','塑料热解':'♻️','生物质热解':'🌿','催化热解':'⚗️','创新催化剂':'✨','科研圈':'🎓'};

// ── State ────────────────────────────────────────────────────────
let allNews      = [];
let activeFilter = '全部';
let currentDate  = '';
let daysMap      = {};   // date -> news[]

// ── Init ─────────────────────────────────────────────────────────
function init() {
  const data = EMBEDDED_DATA;
  // Build daysMap
  data.allDays.forEach(d => { daysMap[d.date] = d.news; });

  // Determine which date to show: today's date OR latest available
  const todayStr = todayDate();
  currentDate = daysMap[todayStr] ? todayStr : data.currentDate;

  allNews = daysMap[currentDate] || [];
  document.getElementById('date-display').textContent = formatDate(currentDate);

  renderStats(allNews);
  renderFilters(allNews);
  renderCards(allNews);
  renderArchive();
}

function todayDate() {
  const d = new Date();
  const p = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}

function formatDate(s) {
  const [y,m,d] = s.split('-');
  return `${y}年${m}月${d}日`;
}

// ── Render ───────────────────────────────────────────────────────
function renderStats(news) {
  const bar = document.getElementById('stats-bar');
  const counts = {};
  CATEGORIES.slice(1).forEach(c => counts[c]=0);
  news.forEach(n => { if(counts[n.category]!==undefined) counts[n.category]++; });
  bar.innerHTML = `
    <div class="stat-item"><div class="stat-value">${news.length}</div><div class="stat-label">今日条目</div></div>
    ${CATEGORIES.slice(1).map(c=>`<div class="stat-item"><div class="stat-value">${counts[c]}</div><div class="stat-label">${CAT_ICONS[c]} ${c}</div></div>`).join('')}
  `;
}

function renderFilters(news) {
  const counts = {'全部': news.length};
  CATEGORIES.slice(1).forEach(c => counts[c]=news.filter(n=>n.category===c).length);
  const bar = document.getElementById('filter-bar');
  bar.innerHTML = CATEGORIES.map(c=>`
    <button class="filter-btn ${activeFilter===c?'active':''}" data-cat="${c}">
      ${CAT_ICONS[c]} ${c} <span class="count-badge">${counts[c]}</span>
    </button>`).join('');
  bar.querySelectorAll('.filter-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{ activeFilter=btn.dataset.cat; renderFilters(allNews); renderCards(allNews); });
  });
}

function renderCards(news) {
  const filtered = activeFilter==='全部' ? news : news.filter(n=>n.category===activeFilter);
  const container = document.getElementById('news-container');
  if(!filtered.length){
    container.innerHTML=`<div class="empty-state"><div class="empty-icon">🔍</div><div>该分类暂无数据</div></div>`;
    return;
  }
  container.innerHTML=`<div class="news-grid">${filtered.map(n=>`
    <div class="news-card" data-cat="${n.category}" onclick="openModal(${n.id})">
      <div class="card-header">
        <span class="cat-pill">${CAT_ICONS[n.category]} ${n.category}</span>
        <span class="card-num">#${String(n.id).padStart(2,'0')}</span>
      </div>
      <div class="news-title">${n.title}</div>
      <div class="news-summary">${n.summary.slice(0,90)}…</div>
      <div class="card-footer">
        <div class="card-source">📄 ${n.source}</div>
        <div class="card-tags">${n.tags.slice(0,2).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      </div>
    </div>`).join('')}</div>`;
}

function renderArchive() {
  const dates = Object.keys(daysMap).sort((a,b)=>b.localeCompare(a));
  const grid = document.getElementById('archive-grid');
  if(!dates.length){
    grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">📭</div><div>暂无往期数据</div></div>`;
    return;
  }
  grid.innerHTML = dates.map(d=>`
    <div class="archive-card ${d===currentDate?'active':''}" data-date="${d}" onclick="switchDate('${d}')">
      <div class="archive-date">${formatDate(d)}</div>
      <div class="archive-count">${daysMap[d].length} 条</div>
    </div>`).join('');
}

function switchDate(date) {
  currentDate = date;
  allNews = daysMap[date] || [];
  activeFilter = '全部';
  document.getElementById('date-display').textContent = formatDate(date);
  renderStats(allNews);
  renderFilters(allNews);
  renderCards(allNews);
  document.querySelectorAll('.archive-card').forEach(c=>c.classList.toggle('active',c.dataset.date===date));
}

function openModal(id) {
  const n = allNews.find(x=>x.id===id);
  if(!n) return;
  document.getElementById('modal-content').innerHTML=`
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-cat"><span class="cat-pill" style="font-size:12px;padding:4px 12px;background:rgba(91,141,239,.12);color:var(--accent)">${CAT_ICONS[n.category]} ${n.category}</span></div>
    <div class="modal-title">${n.title}</div>
    <div class="modal-summary">${n.summary}</div>
    <div class="modal-meta">
      <a class="modal-source-btn" href="${n.url}" target="_blank">🔗 查看原文</a>
      ${n.tags.map(t=>`<span class="tag">${t}</span>`).join('')}
    </div>`;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

document.getElementById('modal-overlay').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeModal(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

// ── Theme toggle ─────────────────────────────────────────────────
(function() {
  const root = document.documentElement;
  const btn  = document.getElementById('theme-toggle');
  const saved = localStorage.getItem('pyro-theme') || 'dark';
  function applyTheme(theme) {
    if (theme === 'light') {
      root.setAttribute('data-theme', 'light');
      btn.textContent = '☀️';
    } else {
      root.removeAttribute('data-theme');
      btn.textContent = '🌙';
    }
    localStorage.setItem('pyro-theme', theme);
  }
  applyTheme(saved);
  btn.addEventListener('click', () => {
    const current = root.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
    applyTheme(current);
  });
})();

init();
</script>
</body>
</html>
