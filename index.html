    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'SF Pro Display','PingFang SC','Helvetica Neue',system-ui,sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* Theme toggle */
    .theme-toggle { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s; }
    .theme-toggle:hover { border-color: var(--accent); background: var(--surface2); }

    /* Header */
    header { background: linear-gradient(135deg,#0d1b3e 0%,#1a1d27 60%,#0d2330 100%); border-bottom: 1px solid var(--border); padding: 20px 0 16px; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px); }
    [data-theme="light"] header { background: linear-gradient(135deg,#dce8ff 0%,#f4f6fb 60%,#d8f0ea 100%); }
    .header-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg,var(--accent),var(--accent2)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .logo h1 { font-size: 20px; font-weight: 700; letter-spacing: .02em; }
    .logo h1 span { color: var(--accent); }
    .logo small { display: block; font-size: 11px; color: var(--text-muted); font-weight: 400; margin-top: 1px; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    #date-display { font-size: 13px; color: var(--text-muted); background: var(--surface); border: 1px solid var(--border); padding: 6px 14px; border-radius: 20px; }
    .update-badge { font-size: 11px; background: rgba(61,191,160,.15); color: var(--accent3); border: 1px solid rgba(61,191,160,.3); padding: 4px 10px; border-radius: 20px; display: flex; align-items: center; gap: 5px; }
    .dot-live { width: 6px; height: 6px; border-radius: 50%; background: var(--accent3); animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.7)} }

    /* Layout */
    .container { max-width: 1200px; margin: 0 auto; padding: 28px 24px; }

    /* Filter */
    .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
    .filter-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); font-size: 13px; cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: 6px; }
    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
    .filter-btn[data-cat="塑料热解"].active { background: var(--cat-plastic); border-color: var(--cat-plastic); }
    .filter-btn[data-cat="生物质热解"].active { background: var(--cat-biomass); border-color: var(--cat-biomass); }
    .filter-btn[data-cat="催化热解"].active { background: var(--cat-catalytic); border-color: var(--cat-catalytic); }
    .filter-btn[data-cat="创新催化剂"].active { background: var(--cat-catalyst); border-color: var(--cat-catalyst); }
    .filter-btn[data-cat="科研圈"].active { background: var(--cat-sci); border-color: var(--cat-sci); }
    .filter-btn[data-cat="科研技巧"].active { background: var(--cat-tips); border-color: var(--cat-tips); }
    .count-badge { background: rgba(255,255,255,.2); border-radius: 10px; padding: 1px 6px; font-size: 11px; }

    /* Stats */
    .stats-bar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
    .stat-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 11px 16px; display: flex; flex-direction: column; gap: 2px; }
    .stat-value { font-size: 22px; font-weight: 700; }
    .stat-label { font-size: 11px; color: var(--text-muted); }

    /* Section title */
    .section-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
    .section-title::after { content:''; flex:1; height:1px; background: var(--border); }

    /* News grid */
    .news-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(340px,1fr)); gap: 14px; margin-bottom: 48px; }
    .news-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px; transition: all .25s; cursor: pointer; display: flex; flex-direction: column; gap: 10px; position: relative; overflow: hidden; }

    .modal-overlay.open { display: flex; }

    .modal-close:hover { background: var(--border); color: var(--text); }
    .modal-cat { margin-bottom: 10px; }
    .modal-title { font-size: 18px; font-weight: 700; line-height: 1.4; margin-bottom: 14px; }
    .modal-summary { font-size: 14px; line-height: 1.8; color: var(--text-muted); margin-bottom: 18px; }
    .modal-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .modal-source-btn { display: inline-flex; align-items: center; gap: 6px; background: var(--accent); color: #fff; text-decoration: none; padding: 8px 18px; border-radius: 20px; font-size: 13px; font-weight: 600; transition: opacity .2s; }
    .modal-source-btn:hover { opacity: .85; }

    /* Empty */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }

    /* Footer */
    footer { border-top: 1px solid var(--border); text-align: center; padding: 20px; color: var(--text-muted); font-size: 12px; line-height: 1.7; }

    @media (max-width: 640px) {
      .news-grid { grid-template-columns: 1fr; }
      .stats-bar { gap: 8px; }
    }

<script>
// ── Config ──────────────────────────────────────────────────────
const CATEGORIES = ['全部','塑料热解','生物质热解','催化热解','创新催化剂','科研圈','科研技巧'];
const CAT_ICONS  = {'全部':'🌐','塑料热解':'♻️','生物质热解':'🌿','催化热解':'⚗️','创新催化剂':'✨','科研圈':'🎓','科研技巧':'💡'};

// ── State ────────────────────────────────────────────────────────
let allNews      = [];
let activeFilter = '全部';
let currentDate  = '';
let daysMap      = {};   // date -> news[]

// ── Init ─────────────────────────────────────────────────────────
function init() {
  const data = EMBEDDED_DATA;
  // Build daysMap
  data.allDays.forEach(d => { daysMap[d.date] = d.news; });

  // Determine which date to show: today's date OR latest available
  const todayStr = todayDate();
  currentDate = daysMap[todayStr] ? todayStr : data.currentDate;

  allNews = daysMap[currentDate] || [];
  document.getElementById('date-display').textContent = formatDate(currentDate);

  renderStats(allNews);
  renderFilters(allNews);
  renderCards(allNews);
  renderArchive();
}

function todayDate() {
  const d = new Date();
  const p = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}

function formatDate(s) {
  const [y,m,d] = s.split('-');
  return `${y}年${m}月${d}日`;
}

// ── Render ───────────────────────────────────────────────────────
function renderStats(news) {
  const bar = document.getElementById('stats-bar');
  const counts = {};
  CATEGORIES.slice(1).forEach(c => counts[c]=0);
  news.forEach(n => { if(counts[n.category]!==undefined) counts[n.category]++; });
  bar.innerHTML = `
    <div class="stat-item"><div class="stat-value">${news.length}</div><div class="stat-label">今日条目</div></div>
    ${CATEGORIES.slice(1).map(c=>`<div class="stat-item"><div class="stat-value">${counts[c]}</div><div class="stat-label">${CAT_ICONS[c]} ${c}</div></div>`).join('')}
  `;
}

function renderFilters(news) {
  const counts = {'全部': news.length};
  CATEGORIES.slice(1).forEach(c => counts[c]=news.filter(n=>n.category===c).length);
  const bar = document.getElementById('filter-bar');
  bar.innerHTML = CATEGORIES.map(c=>`
    <button class="filter-btn ${activeFilter===c?'active':''}" data-cat="${c}">
      ${CAT_ICONS[c]} ${c} <span class="count-badge">${counts[c]}</span>
    </button>`).join('');
  bar.querySelectorAll('.filter-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{ activeFilter=btn.dataset.cat; renderFilters(allNews); renderCards(allNews); });
  });
}

function renderCards(news) {
  const filtered = activeFilter==='全部' ? news : news.filter(n=>n.category===activeFilter);
  const container = document.getElementById('news-container');
  if(!filtered.length){
    container.innerHTML=`<div class="empty-state"><div class="empty-icon">🔍</div><div>该分类暂无数据</div></div>`;
    return;
  }
  container.innerHTML=`<div class="news-grid">${filtered.map(n=>`
    <div class="news-card" data-cat="${n.category}" onclick="openModal(${n.id})">
      <div class="card-header">
        <span class="cat-pill">${CAT_ICONS[n.category]} ${n.category}</span>
        <span class="card-num">#${String(n.id).padStart(2,'0')}</span>
      </div>
      <div class="news-title">${n.title}</div>
      <div class="news-summary">${n.summary.slice(0,90)}…</div>
      <div class="card-footer">
        <div class="card-source">📄 ${n.source}</div>
        <div class="card-tags">${n.tags.slice(0,2).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      </div>
    </div>`).join('')}</div>`;
}

function renderArchive() {
  const dates = Object.keys(daysMap).sort((a,b)=>b.localeCompare(a));
  const grid = document.getElementById('archive-grid');
  if(!dates.length){
    grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">📭</div><div>暂无往期数据</div></div>`;
    return;
  }
  grid.innerHTML = dates.map(d=>`
    <div class="archive-card ${d===currentDate?'active':''}" data-date="${d}" onclick="switchDate('${d}')">
      <div class="archive-date">${formatDate(d)}</div>
      <div class="archive-count">${daysMap[d].length} 条</div>
    </div>`).join('');
}

function switchDate(date) {
  currentDate = date;
  allNews = daysMap[date] || [];
  activeFilter = '全部';
  document.getElementById('date-display').textContent = formatDate(date);
  renderStats(allNews);
  renderFilters(allNews);
  renderCards(allNews);
  document.querySelectorAll('.archive-card').forEach(c=>c.classList.toggle('active',c.dataset.date===date));
}

function openModal(id) {
  const n = allNews.find(x=>x.id===id);
  if(!n) return;
  document.getElementById('modal-content').innerHTML=`
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-cat"><span class="cat-pill" style="font-size:12px;padding:4px 12px;background:rgba(91,141,239,.12);color:var(--accent)">${CAT_ICONS[n.category]} ${n.category}</span></div>
    <div class="modal-title">${n.title}</div>
    <div class="modal-summary">${n.summary}</div>
    <div class="modal-meta">
      <a class="modal-source-btn" href="${n.url}" target="_blank">🔗 查看原文</a>
      ${n.tags.map(t=>`<span class="tag">${t}</span>`).join('')}
    </div>`;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

document.getElementById('modal-overlay').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeModal(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

// ── Theme toggle ─────────────────────────────────────────────────
(function() {
  const root = document.documentElement;
  const btn  = document.getElementById('theme-toggle');
  const saved = localStorage.getItem('pyro-theme') || 'dark';
  function applyTheme(theme) {
    if (theme === 'light') {
      root.setAttribute('data-theme', 'light');
      btn.textContent = '☀️';
    } else {
      root.removeAttribute('data-theme');
      btn.textContent = '🌙';
    }
    localStorage.setItem('pyro-theme', theme);
  }
  applyTheme(saved);
  btn.addEventListener('click', () => {
    const current = root.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
    applyTheme(current);
  });
})();

init();
</script>
